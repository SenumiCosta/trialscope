version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: trialscope-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: trialscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trialscope-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:1234@db:5432/trialscope
      JWT_SECRET: trialscope-jwt-secret-key-super-secure
      # Configure Gemini API Key if passed via environment variables
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build: ./frontend
    container_name: trialscope-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
